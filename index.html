<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ductless Quote Builder — Johnstone Supply NY/CT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:15px;line-height:1.5}
.header{background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header-logo{font-size:15px;font-weight:600}
.header-sub{font-size:13px;color:#666}
.container{max-width:980px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid #e5e5e5}
.tab{padding:8px 18px;font-size:13px;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;color:#666;background:none}
.tab.active{background:#fff;border-color:#e5e5e5;color:#1a1a1a;font-weight:500;margin-bottom:-1px}
.panel{display:none}.panel.active{display:block}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
select,input[type=number]{height:36px;padding:0 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;width:100%}
.qty-input{width:44px!important;text-align:center;height:30px;padding:0 4px}
select:focus,input:focus{outline:none;border-color:#999}
.filters select{flex:1;min-width:130px}
.results{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.sys-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px 16px;transition:border-color .15s}
.sys-card:hover{border-color:#bbb}
.sys-card.in-quote{border:1.5px solid #185FA5}
.card-row{display:flex;align-items:center;gap:12px}
.sys-name{font-size:13px;font-weight:600}
.sys-models{font-size:11px;color:#666;margin-top:3px;font-family:'SF Mono',monospace}
.sys-specs{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
.spec{font-size:11px;color:#888}.spec b{color:#333;font-weight:500}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;background:#e8f0fd;color:#185FA5;font-weight:500;white-space:nowrap}
.badge.mz{background:#e6f5ee;color:#0f6e56}
.add-btn{font-size:12px;padding:6px 14px;white-space:nowrap;background:#fff;border:1px solid #ccc;border-radius:6px;cursor:pointer;color:#333;flex-shrink:0}
.add-btn:hover{background:#f5f5f3;border-color:#999}
.add-btn.added{background:#e8f0fd;border-color:#185FA5;color:#185FA5}
.mz-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.mz-filter select{flex:1;min-width:130px}
.mz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;margin-bottom:16px}
.mz-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px}
.mz-title{font-size:13px;font-weight:600;margin-bottom:3px}
.mz-sub{font-size:11px;color:#666;font-family:'SF Mono',monospace;margin-bottom:3px}
.mz-note{font-size:10px;color:#999;margin-bottom:12px}
.zone-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:8px}
.zone-label{width:50px;color:#666;font-size:12px;flex-shrink:0;padding-top:8px}
.zone-selects{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.zone-selects select{height:30px;font-size:12px}
.zone-model{font-size:10px;color:#185FA5;font-family:'SF Mono',monospace;padding:2px 4px;background:#f0f5ff;border-radius:3px;display:none;word-break:break-all}
.zone-model.visible{display:block}
.zone-pipes{font-size:10px;color:#888}
.btu-bar{margin:10px 0}
.btu-track{height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-top:4px}
.btu-fill{height:100%;border-radius:3px;transition:width .2s,background .2s}
.btu-ok{background:#1D9E75}.btu-over{background:#E24B4A}.btu-under{background:#EF9F27}
.btu-status{font-size:11px;color:#666;display:flex;justify-content:space-between;align-items:baseline}
.mz-warn{font-size:10px;color:#E24B4A;margin-top:4px;display:none}
.mz-warn.visible{display:block}
.mz-add-btn{width:100%;padding:7px;font-size:12px;border-radius:6px;background:#f5f5f3;border:1px solid #ddd;cursor:pointer;color:#333;margin-top:6px}
.mz-add-btn:hover:not(:disabled){background:#eee;border-color:#bbb}
.mz-add-btn:disabled{opacity:.35;cursor:not-allowed}
.grp-label{font-size:11px;color:#888;font-weight:600;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.05em;border-top:1px solid #eee;padding-top:14px}
.grp-label:first-child{border-top:none;padding-top:0;margin-top:0}
.quote-box{background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:16px;overflow:hidden}
.quote-line{display:flex;gap:10px;align-items:flex-start;padding:14px 16px;border-bottom:1px solid #f0f0f0}
.quote-line:last-child{border-bottom:none}
.q-body{flex:1;overflow:hidden;word-break:break-word}
.q-name{font-weight:600;font-size:13px;margin-bottom:4px}
.q-model-list{font-family:'SF Mono',monospace;font-size:11px;color:#555;display:flex;flex-direction:column;gap:3px}
.q-model-row{display:flex;gap:6px;align-items:baseline;min-width:0}
.q-model-row .q-price{margin-left:auto;text-align:right;white-space:nowrap;flex-shrink:0}
.q-total-row{display:flex;justify-content:flex-end;border-top:1px solid #eee;margin-top:6px;padding-top:6px;font-size:12px;font-weight:600;color:#333}
.q-model-label{color:#999;font-size:10px;width:55px;flex-shrink:0}
.q-pipes{font-size:10px;color:#aaa;white-space:nowrap;flex-shrink:0}
.q-note{font-size:11px;color:#999;margin-top:4px;white-space:normal}
.rm-btn{font-size:13px;color:#ccc;cursor:pointer;padding:2px 4px;border:none;background:none;flex-shrink:0}
.rm-btn:hover{color:#E24B4A}
.copy-btn{width:100%;padding:10px;font-size:13px;border-radius:8px;background:#fff;border:1px solid #ccc;cursor:pointer;color:#333;font-weight:500}
.copy-btn:hover{background:#f5f5f3}
.empty{font-size:13px;color:#aaa;text-align:center;padding:32px}
.no-res{font-size:13px;color:#999;padding:12px 0}
.loading{font-size:13px;color:#999;padding:20px;text-align:center}
.qbadge{font-size:10px;padding:1px 6px;border-radius:10px;background:#e8f0fd;color:#185FA5;margin-left:6px;font-weight:500;vertical-align:middle}
.push-btn{width:100%;padding:10px;font-size:13px;border-radius:8px;background:#185FA5;border:none;cursor:pointer;color:#fff;font-weight:500;margin-top:8px}
.push-btn:hover{background:#1450a0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px}
.modal label{font-size:12px;color:#666;display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select{width:100%;height:36px;padding:0 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.modal-btns button{flex:1;padding:9px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500}
.btn-cancel{background:#fff;border:1px solid #ddd;color:#333}
.btn-submit{background:#185FA5;border:none;color:#fff}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.modal-status{font-size:12px;margin-top:10px;text-align:center;color:#666;min-height:18px}
.quote-customer-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.quote-customer-bar input{flex:1;height:36px;padding:0 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.quote-customer-bar .customer-selected-pill{flex:1;padding:8px 10px;background:#f0f5ff;border-radius:6px;font-size:12px;display:flex;align-items:center;gap:8px}
.quote-customer-bar .customer-selected-pill span{font-weight:500;color:#185FA5}
.get-pricing-btn{height:36px;padding:0 16px;background:#0f6e56;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.get-pricing-btn:disabled{opacity:.5;cursor:not-allowed}
.pricing-badge{font-size:11px;color:#0f6e56;font-weight:500;margin-top:2px}
.pricing-list{font-size:10px;color:#aaa;text-decoration:line-through}
.pricing-farm{font-size:11px;color:#185FA5;margin-top:1px}
.customer-dropdown{position:absolute;top:38px;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:10;max-height:180px;overflow-y:auto}
.login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.login-overlay.visible{display:flex}
.login-box{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-title{font-size:16px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:12px;color:#888;margin-bottom:18px}
.login-box label{font-size:12px;color:#666;display:block;margin-bottom:4px;margin-top:12px}
.login-box input{width:100%;height:36px;padding:0 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.login-btn{width:100%;padding:10px;margin-top:18px;border-radius:6px;background:#185FA5;border:none;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{font-size:12px;color:#E24B4A;margin-top:8px;min-height:16px;text-align:center}
.user-badge{font-size:12px;color:#666;margin-left:auto}
.user-badge span{font-weight:500;color:#185FA5}
.user-badge button{font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;margin-left:6px}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-logo">Johnstone Supply NY/CT</div>
    <div class="header-sub">Ductless Quote Builder</div>
  </div>
  <div class="user-badge" id="user-badge" style="display:none">Logged in as <span id="user-name"></span><button onclick="eclipseLogout()">Log out</button>
  </div>
</div>
<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('single')">Single zone</div>
    <div class="tab" onclick="switchTab('multi')">Multi-zone</div>
    <div class="tab" onclick="switchTab('quote')">Quote <span class="qbadge" id="qcount">0</span></div>
  </div>

  <div class="panel active" id="panel-single">
    <div class="filters">
      <select id="s-brand" onchange="renderSingle()"><option value="">All brands</option><option>Daikin</option><option>Hisense</option><option>Bosch</option><option>Fujitsu</option></select>
      <select id="s-cap" onchange="renderSingle()"><option value="">All capacities</option><option value="9">9K</option><option value="12">12K</option><option value="15">15K</option><option value="18">18K</option><option value="24">24K</option><option value="30">30K</option><option value="36">36K</option><option value="42">42K</option><option value="48">48K</option><option value="60">60K</option></select>
      <select id="s-indoor" onchange="renderSingle()"><option value="">All indoor types</option><option value="Wall Mount">Wall mount</option><option value="4-Way Cassette">4-Way cassette</option><option value="1-Way Cassette">1-Way cassette</option><option value="Cassette">Cassette</option><option value="Ducted">Ducted</option><option value="Floor">Floor mount</option><option value="Floor Mount (White)">Floor mount — White</option><option value="Floor Mount (Espresso)">Floor mount — Espresso</option><option value="Air Handler">Air handler</option><option value="Ceiling">Ceiling susp.</option></select>
    </div>
    <div class="results" id="single-results"><div class="loading">Loading...</div></div>
  </div>

  <div class="panel" id="panel-multi">
    <div class="mz-filter" style="align-items:center">
      <select id="mz-brand-filter" onchange="renderMZResults()" style="flex:0 0 auto;min-width:160px">
        <option value="">Brand (optional)</option>
        <option>Bosch</option>
        <option>Daikin</option>
        <option>Fujitsu</option>
        <option>Hisense</option>
      </select>
      <select id="mz-zones" onchange="initMZZones()">
        <option value="">— select zone count —</option>
        <option value="2">2 zones</option>
        <option value="3">3 zones</option>
        <option value="4">4 zones</option>
        <option value="5">5 zones</option>
        <option value="6">6 zones</option>
      </select>
      <button onclick="clearMZ()" style="white-space:nowrap;height:36px;padding:0 14px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:13px;cursor:pointer;color:#666;flex-shrink:0">Clear</button>
    </div>
    <div id="mz-zone-inputs" style="display:none;margin-bottom:16px"></div>
    <div id="multi-results"></div>
  </div>

  <div class="panel" id="panel-quote">
    <div class="quote-customer-bar">
      <div style="position:relative;flex:1;min-width:200px">
        <input type="text" id="q-customer-search" placeholder="Search customer for pricing..." oninput="qCustomerSearchInput()" autocomplete="off"/>
        <div id="q-customer-results" class="customer-dropdown" style="display:none"></div>
      </div>
      <div id="q-customer-selected" style="display:none;flex:1" class="customer-selected-pill">
        <span id="q-customer-name"></span>
        <span id="q-customer-id" style="color:#888"></span>
        <button onclick="clearQCustomer()" style="margin-left:auto;background:none;border:none;color:#aaa;cursor:pointer;font-size:13px">✕</button>
      </div>
      <button class="get-pricing-btn" id="get-pricing-btn" onclick="getPricing()" disabled>Get Pricing</button>
    </div>
    <div class="quote-box" id="quote-box"><div class="empty">No systems added yet</div></div>
    <button class="copy-btn" onclick="copyQuote()">Copy to clipboard</button>
    <button class="push-btn" onclick="openEclipseModal()">Create Quote in Eclipse</button>
  </div>
</div>

<!-- Eclipse Modal -->
<div class="modal-overlay" id="eclipse-modal">
  <div class="modal">
    <div class="modal-title">Create Quote in Eclipse</div>
    <label>Branch</label>
    <select id="modal-branch">
      <option value="BALD">BALD — Baldwin</option>
      <option value="BOH">BOH — Bohemia</option>
      <option value="BKLN">BKLN — Brooklyn</option>
      <option value="FARM">FARM — Farmingdale</option>
      <option value="NHP">NHP — New Hyde Park</option>
      <option value="MANH">MANH — Manhattan</option>
      <option value="STAM">STAM — Stamford</option>
      <option value="MILF">MILF — Milford</option>
      <option value="HART">HART — Hartford</option>
    </select>
    <label>Customer <span style="color:#E24B4A">*</span></label>
    <div style="position:relative">
      <input type="text" id="modal-customer-search" placeholder="Search by name or account number" oninput="customerSearchInput()" autocomplete="off"/>
      <div id="customer-results" style="display:none;position:absolute;top:38px;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:10;max-height:180px;overflow-y:auto"></div>
    </div>
    <div id="customer-selected" style="display:none;margin-top:6px;padding:8px 10px;background:#f0f5ff;border-radius:6px;font-size:12px">
      <span id="customer-selected-name" style="font-weight:500;color:#185FA5"></span>
      <span id="customer-selected-id" style="color:#888;margin-left:6px"></span>
      <button onclick="clearCustomer()" style="float:right;background:none;border:none;color:#aaa;cursor:pointer;font-size:13px">✕</button>
    </div>
    <div id="ordered-by-row" style="display:none">
      <label>Ordered By <span style="color:#E24B4A">*</span></label>
      <select id="modal-ordered-by"><option value="">— select contact —</option></select>
    </div>
    <label>Customer PO # <span style="color:#aaa;font-weight:400">(optional)</span></label>
    <input type="text" id="modal-po" placeholder="e.g. PO-2026-001"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEclipseModal()">Cancel</button>
      <button class="btn-submit" id="modal-submit" onclick="pushToEclipse()">Push Order</button>
    </div>
    <div class="modal-status" id="modal-status"></div>
  </div>
</div>

<!-- Eclipse Login Overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-title">Johnstone Supply NY/CT</div>
    <div class="login-sub">Sign in with your Eclipse credentials to continue</div>
    <label>Username</label>
    <input type="text" id="login-user" placeholder="Eclipse username" autocomplete="username"/>
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="Eclipse password" autocomplete="current-password" onkeydown="if(event.key==='Enter'){event.preventDefault();doLogin()}"/>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<script>
const SB_URL = 'https://jnhgmnpcwiutkidkadbg.supabase.co';
const SB_KEY = 'sb_publishable_jnXngFrJ8t1eG5sxAcTOUQ_1RJ2KnFV';
const H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

let SZ = [], MZ = [], MZ_IDU = {}, MZ_COMBOS = {}, MZ_COMBOS_AHU = {}, quote = [], mzState = {};
let eclipseSession = { token: null, username: null, password: null };

async function fetchData() {
  const [szR, mzR, iduR, comboR, ahuComboR] = await Promise.all([
    fetch(`${SB_URL}/rest/v1/ductless_sz?active=eq.true&order=brand,series,cap`, { headers: H }),
    fetch(`${SB_URL}/rest/v1/ductless_mz?active=eq.true&order=brand,ou_cap`, { headers: H }),
    fetch(`${SB_URL}/rest/v1/ductless_mz_idu?active=eq.true&order=ou_id,cap,type`, { headers: H }),
    fetch(`${SB_URL}/rest/v1/ductless_mz_combos?select=ou_id,combo&order=ou_id`, { headers: H }),
    fetch(`${SB_URL}/rest/v1/ductless_mz_combos_ahu?select=ou_id,combo&order=ou_id`, { headers: H })
  ]);
  SZ = await szR.json();
  MZ = await mzR.json();
  const iduRows = await iduR.json();
  iduRows.forEach(r => { if (!MZ_IDU[r.ou_id]) MZ_IDU[r.ou_id] = []; MZ_IDU[r.ou_id].push(r); });
  // Build combo lookup: MZ_COMBOS[ou_id] = Set of sorted combo strings e.g. "6000,9000,12000"
  const comboRows = await comboR.json();
  comboRows.forEach(r => {
    if (!MZ_COMBOS[r.ou_id]) MZ_COMBOS[r.ou_id] = new Set();
    MZ_COMBOS[r.ou_id].add([...r.combo].sort((a,b)=>a-b).join(','));
  });
  const ahuComboRows = await ahuComboR.json();
  ahuComboRows.forEach(r => {
    if (!MZ_COMBOS_AHU[r.ou_id]) MZ_COMBOS_AHU[r.ou_id] = new Set();
    MZ_COMBOS_AHU[r.ou_id].add([...r.combo].sort((a,b)=>a-b).join(','));
  });
  MZ.forEach(o => { mzState[o.id] = Array.from({length: o.zones_max}, () => ({cap:0,type:'',model:'',liq_pipe:'',gas_pipe:''})); });
  renderSingle();
  renderMulti();
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['single','multi','quote'][i]===t));
  document.querySelectorAll('.panel').forEach((el,i) => el.classList.toggle('active', ['panel-single','panel-multi','panel-quote'][i]==='panel-'+t));
  renderQuote();
}

function renderSingle() {
  const b=document.getElementById('s-brand').value, c=document.getElementById('s-cap').value, ind=document.getElementById('s-indoor').value;
  const list=SZ.filter(s=>(!b||s.brand===b)&&(!c||s.cap===+c)&&(!ind||s.indoor.includes(ind)));
  const el=document.getElementById('single-results');
  if (!list.length){el.innerHTML='<div class="no-res">No systems match.</div>';return;}
  el.innerHTML=list.map(s=>{
    const inQ=quote.some(q=>q.id===s.id);
    return `<div class="sys-card${inQ?' in-quote':''}">
      <div class="card-row">
        <div style="flex:1;min-width:0">
          <div class="sys-name">${s.brand} ${s.series} — ${s.cap}K <span class="badge">${s.ref}</span></div>
          <div class="sys-models">ODU: ${s.ou} · IDU: ${s.iu}</div>
          <div class="sys-specs">
            ${s.seer2?`<div class="spec">SEER2 <b>${s.seer2}</b></div>`:''}
            ${s.hspf2?`<div class="spec">HSPF2 <b>${s.hspf2}</b></div>`:''}
            ${s.heat47?`<div class="spec">Heat @47° <b>${(s.heat47/1000).toFixed(1)}K</b></div>`:''}
            ${s.heat5?`<div class="spec">Heat @5° <b>${(s.heat5/1000).toFixed(1)}K</b></div>`:''}
            ${s.ahri?`<div class="spec">AHRI <b>${s.ahri}</b></div>`:''}
            ${s.liq_pipe?`<div class="spec">Liq <b>${s.liq_pipe}</b> · Gas <b>${s.gas_pipe}</b></div>`:''}
          </div>
        </div>
        <button class="add-btn${inQ?' added':''}" onclick="addSZ('${s.id}')">${inQ?'Added ✓':'+ Add'}</button>
      </div>
    </div>`;
  }).join('');
}

function addSZ(id) {
  const s=SZ.find(x=>x.id===id), ex=quote.find(q=>q.id===id);
  if(ex){ex.qty++;}else{quote.push({...s,qty:1,qtype:'sz'});}
  updateCount(); renderSingle();
}

function iduRows(ouId){return MZ_IDU[ouId]||[];}
function caps(ouId){return [...new Set(iduRows(ouId).map(r=>r.cap))].sort((a,b)=>a-b);}
function typesForCap(ouId,cap){return iduRows(ouId).filter(r=>r.cap===cap);}
function iduRow(ouId,cap,type){return iduRows(ouId).find(r=>r.cap===cap&&r.type===type)||null;}

// ── New multi-zone: zone-first approach ──────────────────────────

let mzZoneState = []; // [{cap, type, model, liq_pipe, gas_pipe}, ...]

function clearMZ() {
  document.getElementById('mz-zones').value = '';
  document.getElementById('mz-brand-filter').value = '';
  mzZoneState = [];
  document.getElementById('mz-zone-inputs').style.display = 'none';
  document.getElementById('mz-zone-inputs').innerHTML = '';
  document.getElementById('multi-results').innerHTML = '';
}

function initMZZones() {
  const n = +document.getElementById('mz-zones').value;
  if (!n) { document.getElementById('mz-zone-inputs').style.display='none'; document.getElementById('multi-results').innerHTML=''; return; }
  mzZoneState = Array.from({length: n}, () => ({cap:0, type:'', model:'', liq_pipe:'', gas_pipe:''}));
  renderMZInputs();
  renderMZResults();
}

function renderMZInputs() {
  const el = document.getElementById('mz-zone-inputs');
  el.style.display = '';
  const allCaps = [...new Set(Object.values(MZ_IDU).flat().map(r => r.cap))].sort((a,b)=>a-b);
  const has6 = allCaps.includes(6), has7 = allCaps.includes(7);
  // Build grouped cap options — merge 6K and 7K into one option
  const capGroups = [];
  if (has6 || has7) capGroups.push({label:'6/7K', value:'6_7'});
  allCaps.filter(c => c!==6 && c!==7).forEach(c => capGroups.push({label:c+'K', value:String(c)}));

  el.innerHTML = mzZoneState.map((z, i) => {
    const selectedVal = z.cap === -1 ? '6_7' : z.cap > 0 ? String(z.cap) : '0';
    const capOpts = ['<option value="0">— select capacity —</option>',
      ...capGroups.map(g => `<option value="${g.value}"${selectedVal===g.value?' selected':''}>${g.label}</option>`)
    ].join('');
    const hasCapSelected = z.cap !== 0;
    const capFilter = z.cap === -1 ? [6,7] : [z.cap];
    const typeRows = hasCapSelected ? [...new Map(Object.values(MZ_IDU).flat().filter(r=>capFilter.includes(r.cap)).map(r=>[r.type,r])).values()] : [];
    const typeOpts = hasCapSelected ? ['<option value="">— select type —</option>',
      ...typeRows.map(t=>`<option value="${t.type}"${z.type===t.type?' selected':''}>${t.type}</option>`)
    ].join('') : '';
    return `<div class="zone-row">
      <span class="zone-label">Zone ${i+1}</span>
      <div class="zone-selects">
        <select onchange="mzSetCap(${i},this.value)">${capOpts}</select>
        ${hasCapSelected?`<select onchange="mzSetType(${i},this.value)">${typeOpts}</select>`:''}
      </div>
    </div>`;
  }).join('');
}

function mzSetCap(idx, val) {
  // 6_7 means user wants 6K or 7K — store as -1 sentinel, resolve per ODU later
  const cap = val === '6_7' ? -1 : +val;
  mzZoneState[idx] = {cap, type:'', model:'', liq_pipe:'', gas_pipe:''};
  renderMZInputs();
  renderMZResults();
}

function mzSetType(idx, type) {
  const z = mzZoneState[idx];
  if (!type) { z.type=''; z.model=''; z.liq_pipe=''; z.gas_pipe=''; }
  else {
    z.type=type; z.model=''; z.liq_pipe=''; z.gas_pipe='';
  }
  renderMZInputs();
  renderMZResults();
}

function renderMZResults() {
  const el = document.getElementById('multi-results');
  const filledZones = mzZoneState.filter(z => (z.cap > 0 || z.cap === -1));
  if (filledZones.length < 2) { el.innerHTML = '<div class="no-res" style="padding:12px 0;color:#999">Fill in at least 2 zones to see matching systems.</div>'; return; }

  // For 6/7K zones (cap===-1), we'll try both 6000 and 7000 in combo lookup
  const filledCaps = filledZones.map(z => z.cap === -1 ? 6000 : z.cap * 1000); // default 6000 for lookup
  const comboKey = [...filledCaps].sort((a,b)=>a-b).join(',');
  const nZones = mzZoneState.length;
  const msCount = mzZoneState.filter(z => z.type==='Mid-Static Duct'||z.type==='Air Handler').length;

  // Find all valid ODUs
  const valid = MZ.filter(o => {
    // Must support enough zones
    if (o.zones_max < nZones) return false;

    // Fujitsu ms_zone_rule check
    const rule = o.ms_zone_rule || null;
    if (msCount > 0 && rule === 2 && nZones > 3) return false;
    if (msCount >= 2 && rule === 3 && nZones > 3) return false;
    if (msCount === 1 && rule === 3 && nZones > 4) return false;

    // Mid-static count check
    const msRows = iduRows(o.id).filter(r => r.type==='Mid-Static Duct'||r.type==='Air Handler');
    const msMax = msRows.length > 0 ? (msRows[0].max_of_type || null) : null;
    if (msMax !== null && msCount > msMax) return false;

    // Check all selected types are available on this ODU
    for (const z of mzZoneState) {
      if ((!z.cap && z.cap !== -1) || !z.type) continue;
      const caps = z.cap === -1 ? [6,7] : [z.cap];
      const hasType = iduRows(o.id).some(r => caps.includes(r.cap) && r.type === z.type);
      if (!hasType) return false;
    }

    // Combo validation — use AHU table if any zone is Air Handler
    const hasAHU = mzZoneState.some(z => z.type === 'Air Handler');
    const combos = hasAHU ? (MZ_COMBOS_AHU[o.id] || null) : MZ_COMBOS[o.id];
    // If AHU selected but this ODU has no AHU combos, exclude it
    if (hasAHU && !MZ_COMBOS_AHU[o.id]) return false;
    if (combos) {
      const has67 = filledZones.some(z => z.cap === -1);
      if (has67) {
        // Generate all 6000/7000 permutations for -1 zones using filledZones indices
        let keys = [filledZones.map(z => z.cap === -1 ? 6000 : z.cap * 1000)];
        filledZones.forEach((z, i) => {
          if (z.cap === -1) {
            const next = [];
            keys.forEach(k => {
              next.push([...k]);
              const k7 = [...k]; k7[i] = 7000; next.push(k7);
            });
            keys = next;
          }
        });
        const anyMatch = keys.some(k => combos.has([...k].sort((a,b)=>a-b).join(',')));
        if (!anyMatch) return false;
      } else {
        if (!combos.has(comboKey)) return false;
      }
    } else {
      // BTU range check (Daikin, Fujitsu)
      const total = filledCaps.reduce((a,b)=>a+b,0);
      if (total > o.max_btu) return false;
      if (o.min_btu > 0 && total < o.min_btu) return false;
    }

    return true;
  });

  if (!valid.length) {
    el.innerHTML = '<div class="no-res" style="padding:12px 0;color:#999">No valid systems found for this combination.</div>';
    return;
  }

  const total = filledZones.reduce((a,z) => a + (z.cap === -1 ? 6000 : z.cap * 1000), 0);

  // Apply optional brand filter
  const brandFilter = document.getElementById('mz-brand-filter')?.value || '';
  const filteredValid = brandFilter ? valid.filter(o => o.brand === brandFilter) : valid;

  // Sort within each brand by closest to 100% without going over
  const sortScore = o => {
    const pct = total / (o.ou_cap * 1000);
    return pct > 1 ? 999 + pct : 1 - pct; // over 100% goes to bottom, under 100% sorted by distance from 100%
  };

  const brands = [...new Set(filteredValid.map(o => o.brand))].sort();
  el.innerHTML = brands.map(brand => {
    const items = filteredValid.filter(o => o.brand === brand).sort((a,b) => sortScore(a) - sortScore(b));
    return `<div class="grp-label">${brand}</div><div class="mz-grid">${items.map(o => renderMZResultCard(o)).join('')}</div>`;
  }).join('');
}

function renderMZResultCard(o) {
  const filledZones = mzZoneState.filter(z => z.cap > 0 && z.type);
  const total = filledZones.reduce((a,z) => a+z.cap*1000, 0);
  const pct = o.ou_cap > 0 ? Math.round(total/(o.ou_cap*1000)*100) : 0;
  const barPct = Math.min(total/o.max_btu*100, 100);
  const allFilled = mzZoneState.every(z => (z.cap > 0 || z.cap === -1) && z.type);

  // Resolve actual model numbers for this ODU
  const zoneLines = mzZoneState.map((z, i) => {
    if (!z.cap) return `<div class="zone-row"><span class="zone-label">Zone ${i+1}</span><div class="zone-selects" style="color:#bbb;font-size:12px;padding-top:8px">— empty —</div></div>`;
    const row = iduRow(o.id, z.cap, z.type) || iduRows(o.id).find(r => r.cap===z.cap && r.type===z.type);
    return `<div class="zone-row">
      <span class="zone-label">Zone ${i+1}</span>
      <div class="zone-selects">
        <div style="font-size:12px;padding-top:6px;color:#333">${z.cap===-1?'6/7K':z.cap+'K'} ${z.type||''}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="mz-card">
    <div class="mz-title">${o.brand} ${o.series} — ${o.ou_cap}K · ${o.zones_max}-zone max</div>
    <div class="mz-sub">${o.ou}</div>
    <div class="mz-note">${o.note||''}</div>
    ${zoneLines}
    <div class="btu-bar">
      <div class="btu-status"><span>${total/1000}K total (${pct}%)</span>${o.min_btu>0?`<span style="font-size:10px;color:#bbb">${o.min_btu/1000}–${o.max_btu/1000}K valid</span>`:''}</div>
      <div class="btu-track"><div class="btu-fill btu-ok" style="width:${barPct}%"></div></div>
    </div>
    <button class="mz-add-btn" onclick="addMZResult('${o.id}')" ${allFilled?'':'disabled'}>${allFilled?'+ Add to quote':'Complete all zones to add'}</button>
  </div>`;
}

function addMZResult(ouId) {
  const o = MZ.find(x => x.id === ouId);
  const zones = mzZoneState.map((z, i) => {
    if ((!z.cap && z.cap !== -1) || !z.type) return null;
    const capToUse = z.cap === -1 ? ([6,7].find(c => iduRows(ouId).some(r=>r.cap===c&&r.type===z.type)) || 6) : z.cap;
    const row = iduRow(ouId, capToUse, z.type) || iduRows(ouId).find(r => r.cap===capToUse && r.type===z.type);
    return {z: i+1, cap: capToUse, type: z.type, model: row?row.model:z.model, liq_pipe: row?row.liq_pipe:z.liq_pipe, gas_pipe: row?row.gas_pipe:z.gas_pipe};
  }).filter(Boolean);
  const total = zones.reduce((a,z) => a+z.cap*1000, 0);
  quote.push({id: ouId+'-'+Date.now(), brand: o.brand, series: o.series, cap: o.ou_cap, ou: o.ou,
    ref: o.ref, seer2: o.seer2, hspf2: o.hspf2, qty: 1, qtype: 'mz', zones, totalBtu: total,
    note: `${zones.length}-zone · ${total/1000}K total`});
  updateCount();
  // Reset zone inputs
  mzZoneState = mzZoneState.map(() => ({cap:0, type:'', model:'', liq_pipe:'', gas_pipe:''}));
  renderMZInputs();
  renderMZResults();
}

function formatCatNumLocal(model) {
  if (!model) return null;
  if (model.startsWith('BMS500-')) return model.replace('BMS500-', '');
  return model;
}

function getPrice(model) {
  if (!quotePricing?.pricing || !model) return null;
  const key = formatCatNumLocal(model);
  return quotePricing.pricing[key] || quotePricing.pricing[model] || null;
}

function priceBadge(model) {
  if (!quotePricing?.pricing || !model) return '';
  const key = formatCatNumLocal(model);
  const p = quotePricing.pricing[key] || quotePricing.pricing[model];
  const inv = quotePricing.inventory?.[key] || quotePricing.inventory?.[model];
  if (!p && !inv) return '';
  let priceHtml = '';
  if (p?.price != null) {
    priceHtml += `<span class="pricing-badge">$${p.price.toFixed(2)}</span>`;
    if (p.list != null && p.list > p.price) priceHtml += ` <span class="pricing-list">$${p.list.toFixed(2)}</span>`;
  }
  let invHtml = '';
  // Inventory
  const branch = quotePricing.userBranch || '';
  const userQty = inv?.userQty ?? 0;
  const farmQty = inv?.farmQty ?? 0;
  if (quotePricing.inventory) {
    if (branch === 'FARM') {
      invHtml += `<span style="font-size:11px;color:#666">FARM: ${userQty}</span>`;
    } else {
      invHtml += `<span style="font-size:11px;color:#666">${branch}: ${userQty}</span>`;
      invHtml += ` <span class="pricing-farm">FARM: ${farmQty}</span>`;
    }
  }
  return `<span class="q-price">${priceHtml}${invHtml ? ' '+invHtml : ''}</span>`;
}

function renderQuote() {
  const el=document.getElementById('quote-box');
  if(!quote.length){el.innerHTML='<div class="empty">No systems added yet</div>';return;}
  el.innerHTML=quote.map((q,qi)=>{
    let models='';
    if(q.qtype==='sz'){
      // IDU first for single zone (Eclipse add-on ordering)
      const iduPrice = getPrice(q.iu);
      const oduPrice = getPrice(q.ou);
      const szTotal = (iduPrice?.price||0) + (oduPrice?.price||0);
      models=`<div class="q-model-list">
        <div class="q-model-row"><span class="q-model-label">IDU</span><span>${q.iu}</span>${q.liq_pipe?`<span class="q-pipes">Liq: ${q.liq_pipe} · Gas: ${q.gas_pipe}</span>`:''}${priceBadge(q.iu)}</div>
        <div class="q-model-row"><span class="q-model-label">ODU</span><span>${q.ou}</span>${priceBadge(q.ou)}</div>
        ${q.ahri?`<div class="q-model-row"><span class="q-model-label">AHRI</span><span>${q.ahri}</span></div>`:''}
        ${szTotal>0?`<div class="q-total-row">System total: $${szTotal.toFixed(2)}</div>`:''}
      </div>`;
    } else {
      const zlines=q.zones.map(z=>`<div class="q-model-row"><span class="q-model-label">Zone ${z.z}</span><span>${z.model}</span><span style="color:#999;font-size:10px;white-space:nowrap">${z.cap}K ${z.type}</span>${z.liq_pipe?`<span class="q-pipes">Liq: ${z.liq_pipe} · Gas: ${z.gas_pipe}</span>`:''}${priceBadge(z.model)}</div>`).join('');
      const oduPrice = getPrice(q.ou);
      const zoneTotal = q.zones.reduce((a,z)=>{ const p=getPrice(z.model); return a+(p?.price||0); },0);
      const mzTotal = (oduPrice?.price||0) + zoneTotal;
      models=`<div class="q-model-list">
        <div class="q-model-row"><span class="q-model-label">ODU</span><span>${q.ou}</span>${priceBadge(q.ou)}</div>
        ${zlines}
        ${mzTotal>0?`<div class="q-total-row">System total: $${mzTotal.toFixed(2)}</div>`:''}
      </div>`;
    }
    return `<div class="quote-line">
      <input type="number" class="qty-input" min="1" value="${q.qty}" onchange="changeQty(${qi},+this.value)"/>
      <div class="q-body">
        <div class="q-name">${q.brand} ${q.series} — ${q.cap}K <span class="badge ${q.qtype==='mz'?'mz':''}">${q.qtype==='mz'?'Multi-zone':'Single zone'}</span></div>
        ${models}
        <div class="q-note">SEER2: ${q.seer2||'—'} · HSPF2: ${q.hspf2||'—'} · Ref: ${q.ref}${q.note?' · '+q.note:''}</div>
      </div>
      <button class="rm-btn" onclick="removeQ(${qi})">✕</button>
    </div>`;
  }).join('');
}

function copyQuote() {
  if(!quote.length){alert('Add systems first.');return;}
  const lines=['DUCTLESS QUOTE — Johnstone Supply NY/CT','Date: '+new Date().toLocaleDateString(),''];
  quote.forEach(q=>{
    lines.push('---');
    lines.push(`QTY: ${q.qty}  |  ${q.qtype==='mz'?'Multi-zone':'Single zone'}  |  ${q.brand} ${q.series} — ${q.cap}K`);
    lines.push(`ODU: ${q.ou}`);
    if(q.qtype==='sz'){
      lines.push(`IDU: ${q.iu}${q.liq_pipe?`  |  Liq: ${q.liq_pipe}  Gas: ${q.gas_pipe}`:''}`);
      if(q.ahri) lines.push(`AHRI: ${q.ahri}`);
    } else {
      q.zones.forEach(z=>lines.push(`Zone ${z.z}: ${z.model}  (${z.cap}K ${z.type})${z.liq_pipe?`  |  Liq: ${z.liq_pipe}  Gas: ${z.gas_pipe}`:''}`));

async function pushToEclipse() {
  const branch = document.getElementById('modal-branch').value;
  const customerPO = document.getElementById('modal-po').value.trim();
  const statusEl = document.getElementById('modal-status');
  const submitBtn = document.getElementById('modal-submit');
  const orderBy = document.getElementById('modal-ordered-by').value;

  if (!selectedCustomer) { statusEl.style.color='#E24B4A'; statusEl.textContent='Please search for and select a customer.'; return; }
  if (document.getElementById('ordered-by-row').style.display !== 'none' && !orderBy) {
    statusEl.style.color='#E24B4A'; statusEl.textContent='Please select an Ordered By contact.'; return;
  }

  submitBtn.disabled = true;
  statusEl.textContent = 'Creating order in Eclipse...';
  statusEl.style.color = '#666';

  const lines = [];
  quote.forEach(q => {
    if (q.qtype === 'sz') {
      lines.push({ model: q.ou, qty: q.qty, description: `${q.brand} ${q.series} ${q.cap}K ODU` });
      lines.push({ model: q.iu, qty: q.qty, description: `${q.brand} ${q.series} ${q.cap}K IDU` });
    } else {
      lines.push({ model: q.ou, qty: q.qty, description: `${q.brand} ${q.series} ${q.cap}K ODU` });
      q.zones.forEach(z => {
        lines.push({ model: z.model, qty: q.qty, description: `${z.cap}K ${z.type} IDU` });
      });
    }
  });

  try {
    const res = await fetch('/api/eclipse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'order',
        sessionToken: eclipseSession.token,
        username: eclipseSession.username,
        password: eclipseSession.password,
        branch,
        customerAccount: selectedCustomer.id,
        customerPO,
        orderBy,
        lines
      })
    });
    const data = await res.json();
    if (data.newToken) { eclipseSession.token = data.newToken; localStorage.setItem('eclipseToken', data.newToken); }
    if (data.success) {
      statusEl.style.color = '#0f6e56';
      statusEl.textContent = `✓ Quote created in Eclipse — Order #${data.orderId}`;
    } else if (res.status === 401) {
      statusEl.style.color = '#E24B4A';
      statusEl.textContent = 'Session expired — please log out and sign in again.';
      submitBtn.disabled = false;
    } else {
      statusEl.style.color = '#E24B4A';
      statusEl.textContent = `Error: ${data.error}${data.detail ? ' — ' + data.detail : ''}`;
      submitBtn.disabled = false;
    }
  } catch (err) {
    statusEl.style.color = '#E24B4A';
    statusEl.textContent = `Network error: ${err.message}`;
    submitBtn.disabled = false;
  }
}


// ── Quote tab customer search & pricing ──────────────────────────

let qSelectedCustomer = null;
let qCustomerSearchTimer = null;
let quotePricing = {}; // catalog# -> {price, list, farmPrice}

function qCustomerSearchInput() {
  clearTimeout(qCustomerSearchTimer);
  const q = document.getElementById('q-customer-search').value.trim();
  const resultsEl = document.getElementById('q-customer-results');
  if (q.length < 2) { resultsEl.style.display='none'; return; }
  qCustomerSearchTimer = setTimeout(() => qSearchCustomers(q), 350);
}

async function qSearchCustomers(keyword) {
  const resultsEl = document.getElementById('q-customer-results');
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:#888">Searching...</div>';
  try {
    const res = await fetch('/api/eclipse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'searchCustomers', sessionToken: eclipseSession.token, keyword })
    });
    const data = await res.json();
    if (!data.results?.length) { resultsEl.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:#888">No customers found.</div>'; return; }
    resultsEl.innerHTML = data.results.map(c => `
      <div onclick="qSelectCustomer(${JSON.stringify(c).replace(/"/g,'&quot;')})"
           style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:12px"
           onmouseover="this.style.background='#f5f5f3'" onmouseout="this.style.background=''">
        <div style="font-weight:500">${c.name}</div>
        <div style="color:#888">#${c.id}${c.city?' · '+c.city+', '+c.state:''}</div>
      </div>`).join('');
  } catch(err) {
    resultsEl.innerHTML = `<div style="padding:8px 12px;font-size:12px;color:#E24B4A">Error: ${err.message}</div>`;
  }
}

function qSelectCustomer(c) {
  qSelectedCustomer = c;
  document.getElementById('q-customer-results').style.display = 'none';
  document.getElementById('q-customer-search').style.display = 'none';
  document.getElementById('q-customer-selected').style.display = 'flex';
  document.getElementById('q-customer-name').textContent = c.name;
  document.getElementById('q-customer-id').textContent = '#' + c.id;
  document.getElementById('get-pricing-btn').disabled = false;
  // Also pre-fill the modal customer
  selectedCustomer = c;
  document.getElementById('modal-customer-search').style.display = 'none';
  document.getElementById('customer-selected').style.display = 'block';
  document.getElementById('customer-selected-name').textContent = c.name;
  document.getElementById('customer-selected-id').textContent = '#' + c.id;
  const obRow = document.getElementById('ordered-by-row');
  const obSelect = document.getElementById('modal-ordered-by');
  if (c.contacts?.length) {
    obSelect.innerHTML = '<option value="">— select contact —</option>' + c.contacts.map(ct=>`<option value="${ct.id}">${ct.name}</option>`).join('');
    obRow.style.display = 'block';
  } else { obRow.style.display='none'; }
}

function clearQCustomer() {
  qSelectedCustomer = null;
  quotePricing = {};
  document.getElementById('q-customer-search').value = '';
  document.getElementById('q-customer-search').style.display = '';
  document.getElementById('q-customer-selected').style.display = 'none';
  document.getElementById('get-pricing-btn').disabled = true;
  renderQuote();
}

async function getPricing() {
  if (!qSelectedCustomer || !quote.length) return;
  const btn = document.getElementById('get-pricing-btn');
  btn.textContent = 'Loading...';
  btn.disabled = true;

  // Collect all catalog numbers from the quote
  const catalogNumbers = [];
  quote.forEach(q => {
    if (q.qtype === 'sz') {
      catalogNumbers.push(formatCatNum(q.ou), formatCatNum(q.iu));
    } else {
      catalogNumbers.push(formatCatNum(q.ou));
      q.zones.forEach(z => catalogNumbers.push(formatCatNum(z.model)));
    }
  });
  const unique = [...new Set(catalogNumbers.filter(Boolean))];

  const userBranch = localStorage.getItem('eclipseHomeBranch') || 'FARM';

  try {
    const res = await fetch('/api/eclipse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'pricing',
        sessionToken: eclipseSession.token,
        customerId: qSelectedCustomer.id,
        userId: eclipseSession.username,
        userBranch,
        catalogNumbers: unique
      })
    });
    const data = await res.json();
    console.log('Pricing response:', data);
    quotePricing = { pricing: data.pricing||{}, inventory: data.inventory||{}, userBranch: data.userBranch, rawPricing: data.rawPricing, rawInv: data.rawInv };
    console.log('Debug:', data.debug);
    console.log('Pricing raw:', data.rawPricing, 'Inv raw:', data.rawInv);
    renderQuote();
  } catch(err) {
    console.error('Pricing error:', err);
  }

  btn.textContent = 'Refresh Pricing';
  btn.disabled = false;
}

function formatCatNum(model) {
  if (!model) return null;
  if (model.startsWith('BMS500-')) return model.replace('BMS500-', '');
  return model;
}

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!username || !password) { errEl.textContent = 'Please enter your username and password.'; return; }
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.textContent = '';
  try {
    const res = await fetch('/api/eclipse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed.';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    eclipseSession = { token: data.sessionToken, username, password };
    localStorage.setItem('eclipseToken', data.sessionToken);
    localStorage.setItem('eclipseUser', data.username || username);
    localStorage.setItem('eclipsePass', password);
    if (data.homeBranch) localStorage.setItem('eclipseHomeBranch', data.homeBranch);
    document.getElementById('login-overlay').classList.remove('visible');
    document.getElementById('user-name').textContent = data.username || username;
    document.getElementById('user-badge').style.display = '';
    if (data.homeBranch) { const b = document.getElementById('modal-branch'); if (b) b.value = data.homeBranch; }
  } catch (err) {
    errEl.textContent = 'Network error — ' + err.message;
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function eclipseLogout() {
  eclipseSession = { token: null, username: null, password: null };
  localStorage.removeItem('eclipseToken');
  localStorage.removeItem('eclipseUser');
  localStorage.removeItem('eclipsePass');
  localStorage.removeItem('eclipseHomeBranch');
  document.getElementById('login-overlay').classList.add('visible');
  document.getElementById('user-badge').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Sign In';
}


// Restore session from localStorage on load
(function() {
  const token = localStorage.getItem('eclipseToken');
  const username = localStorage.getItem('eclipseUser');
  const password = localStorage.getItem('eclipsePass');
  const homeBranch = localStorage.getItem('eclipseHomeBranch');
  if (token && username) {
    eclipseSession = { token, username, password };
    document.getElementById('user-name').textContent = username;
    document.getElementById('user-badge').style.display = '';
    if (homeBranch) { const b = document.getElementById('modal-branch'); if (b) b.value = homeBranch; }
  } else {
    document.getElementById('login-overlay').classList.add('visible');
  }
})();

fetchData();
</script>
